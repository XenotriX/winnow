pre-commit:
  parallel: true
  commands:
    no-em-dashes:
      glob: "*.{py,md,tape,toml,yml,yaml}"
      run: |
        if grep -Prn '\x{2014}' {staged_files}; then
          echo "Em-dashes found. Use standard punctuation instead."
          exit 1
        fi
    format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    lint:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    typecheck:
      run: uv run basedpyright src/ tests/
    test:
      run: uv run pytest
