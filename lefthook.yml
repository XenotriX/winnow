pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    lint:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    typecheck:
      run: uv run basedpyright src/ tests/
    test:
      run: uv run pytest
